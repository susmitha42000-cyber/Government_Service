    <path d="M0 760 C220 705 420 720 620 764 C820 808 980 820 1170 790 C1330 765 1470 742 1600 760 L1600 900 L0 900 Z" fill="#b9c78d"/>
    <path d="M0 790 C220 748 440 765 620 800 C820 837 1000 845 1180 820 C1340 798 1490 784 1600 796 L1600 900 L0 900 Z" fill="#9fb270"/>
    <g opacity="0.4" fill="#4b5e2a">
      <circle cx="120" cy="790" r="44"/>
      <circle cx="210" cy="812" r="34"/>
      <circle cx="1380" cy="790" r="50"/>
      <circle cx="1480" cy="815" r="36"/>
      <circle cx="540" cy="820" r="28"/>
      <circle cx="980" cy="825" r="34"/>
