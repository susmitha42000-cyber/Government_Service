    <rect x="560" y="330" width="4" height="95" fill="#836b55"/>
    <rect x="1038" y="320" width="4" height="95" fill="#836b55"/>
    <path d="M564 330h40l-12 14 12 14h-40z" fill="#d33b3b"/>
    <path d="M1042 320h40l-12 14 12 14h-40z" fill="#d33b3b"/>

