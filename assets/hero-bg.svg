    <rect x="360" y="390" width="880" height="220" rx="8" fill="#e5c7a7" opacity="0.55"/>

    <!-- left wing -->
    <rect x="330" y="420" width="330" height="230" rx="6" fill="url(#stone)"/>
    <rect x="360" y="445" width="270" height="160" rx="4" fill="#f4dfc7" opacity="0.42"/>
    <g fill="#f8f4ef">
      <rect x="390" y="470" width="28" height="58" rx="4"/>
      <rect x="440" y="470" width="28" height="58" rx="4"/>
      <rect x="490" y="470" width="28" height="58" rx="4"/>
      <rect x="540" y="470" width="28" height="58" rx="4"/>
