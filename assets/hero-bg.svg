    <!-- dome -->
    <ellipse cx="800" cy="220" rx="165" ry="135" fill="url(#dome)"/>
    <path d="M635 220c0-95 74-170 165-170s165 75 165 170" fill="none" stroke="#9f9487" stroke-width="18" stroke-linecap="round"/>
    <rect x="742" y="126" width="116" height="70" rx="18" fill="#d9d3cb"/>
    <circle cx="800" cy="104" r="16" fill="#9f9487"/>
    <rect x="792" y="88" width="16" height="36" rx="6" fill="#9f9487"/>
    <path d="M720 205h160v28c0 18-12 30-30 30h-100c-18 0-30-12-30-30z" fill="#c8c0b6"/>

