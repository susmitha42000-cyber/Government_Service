<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8ec7f0"/>
      <stop offset="55%" stop-color="#c7e3f8"/>
      <stop offset="100%" stop-color="#f4f8fb"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e7c7a4"/>
      <stop offset="45%" stop-color="#c89f74"/>
      <stop offset="100%" stop-color="#9c7653"/>
    </linearGradient>
    <linearGradient id="dome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2eee8"/>
      <stop offset="100%" stop-color="#b9b0a4"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <path d="M0 580 C220 520 360 530 560 560 C720 584 840 585 1000 560 C1180 532 1360 512 1600 550 L1600 900 L0 900 Z" fill="#edf3e7"/>
  <path d="M0 650 C210 612 360 610 520 634 C690 660 860 672 1030 646 C1200 618 1380 600 1600 632 L1600 900 L0 900 Z" fill="#dfe9d6"/>

  <g opacity="0.18">
