      <rect x="390" y="545" width="28" height="58" rx="4"/>
      <rect x="440" y="545" width="28" height="58" rx="4"/>
      <rect x="490" y="545" width="28" height="58" rx="4"/>
      <rect x="540" y="545" width="28" height="58" rx="4"/>
      <rect x="590" y="545" width="28" height="58" rx="4"/>
    </g>

    <!-- right wing -->
    <rect x="920" y="420" width="350" height="230" rx="6" fill="url(#stone)"/>
    <rect x="950" y="445" width="290" height="160" rx="4" fill="#f4dfc7" opacity="0.42"/>
    <g fill="#f8f4ef">
      <rect x="980" y="470" width="28" height="58" rx="4"/>
      <rect x="1030" y="470" width="28" height="58" rx="4"/>
      <rect x="1080" y="470" width="28" height="58" rx="4"/>
      <rect x="1130" y="470" width="28" height="58" rx="4"/>
      <rect x="1180" y="470" width="28" height="58" rx="4"/>
      <rect x="980" y="545" width="28" height="58" rx="4"/>
      <rect x="1030" y="545" width="28" height="58" rx="4"/>
      <rect x="1080" y="545" width="28" height="58" rx="4"/>
      <rect x="1130" y="545" width="28" height="58" rx="4"/>
      <rect x="1180" y="545" width="28" height="58" rx="4"/>
