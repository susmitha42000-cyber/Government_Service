<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Login - National Government Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #4A235A;
            --secondary-blue: #6A3BA0;
            --accent-orange: #D4AF37;
            --light-gray: #f8f7f5;
            --dark-gray: #2c2c2c;
            --text-gray: #5a5a5a;
            --border-color: #dcd5cc;
            --shadow: 0 4px 15px rgba(74, 35, 90, 0.1);
            --shadow-lg: 0 8px 30px rgba(74, 35, 90, 0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 380px;
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            color: white;
            padding: 28px 18px 24px;
            text-align: center;
        }

        .login-header .logo-section {
            margin-bottom: 12px;
        }

        .login-header .brand-logo--header {
            width: 96px;
            height: auto;
            max-width: 100%;
        }

        .emblem {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 36px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .login-header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .login-body {
            padding: 28px 24px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark-gray);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: white;
            color: var(--dark-gray);
        }

        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: white;
            color: var(--dark-gray);
        }

        .password-field {
            position: relative;
        }

        .password-field input {
            padding-right: 48px;
        }

        .password-toggle {
            position: absolute;
            top: 50%;
            right: 14px;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: var(--primary-blue);
            cursor: pointer;
            padding: 0;
            font-size: 16px;
            line-height: 1;
        }

        .password-toggle:hover {
            color: var(--secondary-blue);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(0, 51, 153, 0.1);
        }

        .form-group input::placeholder {
            color: var(--text-gray);
        }

        .form-group input.error {
            border-color: #f44336;
            background: #ffebee;
        }

        .error-message {
            color: #f44336;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .remember-me label {
            margin: 0;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            color: var(--text-gray);
        }

        .forgot-password {
            text-decoration: none;
            color: var(--primary-blue);
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .forgot-password:hover {
            color: var(--secondary-blue);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: var(--text-gray);
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .divider::before {
            margin-right: 10px;
        }

        .divider::after {
            margin-left: 10px;
        }

        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .social-btn {
            padding: 12px;
            border: 2px solid var(--border-color);
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .social-btn:hover {
            border-color: var(--primary-blue);
            color: var(--primary-blue);
        }

        .register-link {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .register-link p {
            color: var(--text-gray);
            font-size: 14px;
        }

        .register-link a {
            color: var(--accent-orange);
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .register-link a:hover {
            color: #FF8C00;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            gap: 12px;
        }

        .success-message,
        .error-message-box {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            font-weight: 600;
        }

        .success-message {
            background: #c8e6c9;
            color: #2e7d32;
            display: none;
        }

        .error-message-box {
            background: #ffcdd2;
            color: #c62828;
        }

        @media (min-width: 769px) {
            .login-container {
                max-width: 580px;
            }

            .login-header {
                padding: 18px 22px 14px;
            }

            .login-header .logo-section {
                margin-bottom: 8px;
            }

            .login-header .brand-logo--header {
                width: 88px;
            }

            .emblem {
                width: 56px;
                height: 56px;
                margin-bottom: 12px;
                font-size: 28px;
            }

            .login-header h1 {
                font-size: 22px;
                margin-bottom: 4px;
            }

            .login-body {
                padding: 18px 26px 20px;
            }

            .form-group {
                margin-bottom: 16px;
            }

            .checkbox-group {
                margin-bottom: 16px;
            }

            .login-btn {
                margin-bottom: 10px;
                padding: 12px;
            }

            .divider {
                margin: 16px 0;
            }

            .social-login {
                margin-bottom: 14px;
            }

            .register-link {
                padding-top: 14px;
            }

            .back-link {
                margin-bottom: 18px;
            }

            .success-message,
            .error-message-box {
                margin-bottom: 14px;
                padding: 12px 14px;
            }
        }

        @media (max-width: 480px) {
            body {
                align-items: flex-start;
                padding: 12px;
            }

            .login-container {
                max-width: 100%;
                margin: 0 auto;
            }

            .login-header {
                padding: 24px 16px 20px;
            }

            .login-header h1 {
                font-size: 22px;
            }

            .login-body {
                padding: 24px 18px;
            }

            .social-login {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body data-stackly-no-loader="true">

    <div class="login-container">
        <!-- Login Header -->
        <div class="login-header">
       
            <div class="logo-section">
                    <a href="index.html" class="brand-link" aria-label="Stackly home">
                        <img src="assets/stackly-whitish_blue-logo.webp" alt="Stackly" class="brand-logo brand-logo--header">
                    </a>
                </div>
            <h1>Stackly Login</h1>
            <p>Access Government Services</p>
        </div>

        <!-- Login Body -->
        <div class="login-body">
            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>

            

            <div id="errorMessage" class="error-message-box"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="loginForm" autocomplete="off">
                <!-- Email/Phone -->
                <div class="form-group">
                    <label for="emailOrPhone">Email or Mobile Number</label>
                    <input 
                        type="text" 
                        id="emailOrPhone" 
                        name="emailOrPhone" 
                        placeholder="Enter your email or 10-digit mobile number"
                        autocomplete="off"
                        required
                    >
                    <div class="error-message" id="emailPhoneError"></div>
                </div>

                <!-- Role -->
                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" name="role" required>
                        <option value="" selected disabled>Select your role</option>
                        <option value="citizen">Citizen</option>
                        <option value="official">Department Official</option>
                        <option value="admin">Administrator</option>
                    </select>
                    <div class="error-message" id="roleError"></div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-field">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password"
                            autocomplete="new-password"
                            required
                        >
                        <button type="button" class="password-toggle" aria-label="Show password" onclick="togglePasswordVisibility('password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="error-message" id="passwordError"></div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="checkbox-group">
                    <div class="remember-me">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <label for="rememberMe">Remember me</label>
                    </div>
                    <a href="404.html" class="forgot-password">Forgot Password?</a>
                </div>

                <!-- Login Button -->
                <button type="submit" class="login-btn">
                    <span id="btnText">Sign In</span>
                    <i id="btnIcon" class="fas fa-arrow-right" style="display: none;"></i>
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">or</div>

            <!-- Social Login -->
            <div class="social-login">
                <button type="button" class="social-btn" onclick="socialLogin('google')">
                    <i class="fab fa-google"></i> Google
                </button>
                <button type="button" class="social-btn" onclick="socialLogin('aadhar')">
                    <i class="fas fa-id-card"></i> Aadhaar
                </button>
            </div>

            <!-- Register Link -->
            <div class="register-link">
                <p>Don't have an account? <a href="signup.html">Register Now</a></p>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 2000; align-items: center; justify-content: center;">
        <div style="background: white; border-radius: 12px; padding: 40px; max-width: 400px; width: 90%; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);">
            <h2 style="color: var(--primary-blue); margin-bottom: 15px; font-size: 24px;">Forgot Password?</h2>
            <p style="color: var(--text-gray); margin-bottom: 25px; font-size: 14px;">Enter your email or mobile number to receive password reset instructions.</p>
            
            <form id="forgotPasswordForm" onsubmit="submitForgotPassword(event)">
                <div class="form-group">
                    <input 
                        type="text" 
                        id="resetEmailPhone" 
                        placeholder="Email or Mobile Number"
                        autocomplete="off"
                        required
                    >
                </div>
                <button type="submit" class="login-btn">Send Reset Link</button>
                <button type="button" onclick="closeForgotPassword()" style="width: 100%; padding: 12px; border: 2px solid var(--border-color); background: white; color: var(--primary-blue); border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 10px;">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        // Form Submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const emailOrPhone = document.getElementById('emailOrPhone').value.trim();
            const role = document.getElementById('role').value.trim();
            const password = document.getElementById('password').value.trim();

            // Clear previous errors
            clearErrors();

            // Validation
            let isValid = true;

            if (!emailOrPhone) {
                showFieldError('emailPhone', 'Please enter email or mobile number');
                isValid = false;
            } else if (!validateEmailOrPhone(emailOrPhone)) {
                showFieldError('emailPhone', 'Please enter a valid email or 10-digit mobile number');
                isValid = false;
            }

            if (!role) {
                showFieldError('role', 'Please select your role');
                isValid = false;
            }

            if (!password) {
                showFieldError('password', 'Please enter your password');
                isValid = false;
            } else if (password.length < 6) {
                showFieldError('password', 'Password must be at least 6 characters');
                isValid = false;
            }

            if (isValid) {
                submitLogin(emailOrPhone, role, password);
            }
        });

        function validateEmailOrPhone(value) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const phoneRegex = /^\d{10}$/;
            return emailRegex.test(value) || phoneRegex.test(value);
        }

        function togglePasswordVisibility(fieldId, button) {
            const input = document.getElementById(fieldId);
            const icon = button.querySelector('i');
            const isPassword = input.type === 'password';

            input.type = isPassword ? 'text' : 'password';
            button.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
            icon.classList.toggle('fa-eye', !isPassword);
            icon.classList.toggle('fa-eye-slash', isPassword);
        }

        function showFieldError(field, message) {
            const errorElement = document.getElementById(field + 'Error');
            const inputElement = document.getElementById(
                field === 'emailPhone' ? 'emailOrPhone' : field
            );
            
            if (errorElement) {
                errorElement.textContent = message;
                errorElement.classList.add('show');
            }
            
            if (inputElement) {
                inputElement.classList.add('error');
                inputElement.addEventListener('focus', function() {
                    this.classList.remove('error');
                    errorElement.classList.remove('show');
                }, { once: true });
            }
        }

        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => {
                el.classList.remove('show');
                el.textContent = '';
            });
            document.querySelectorAll('input, select').forEach(el => {
                el.classList.remove('error');
            });
        }

        function submitLogin(emailOrPhone, role, password) {
            const btn = document.querySelector('.login-btn');
            const btnText = document.getElementById('btnText');

            // Show loading state
            btn.classList.add('loading');
            btn.disabled = true;
            btnText.textContent = 'Signing in...';

            // Simulate API call
            setTimeout(() => {
                // Check "Remember Me"
                if (document.getElementById('rememberMe').checked) {
                    localStorage.setItem('rememberedLogin', emailOrPhone);
                } else {
                    localStorage.removeItem('rememberedLogin');
                }

                sessionStorage.setItem('portalCurrentUser', emailOrPhone);
                sessionStorage.setItem('portalCurrentRole', role);

                const successMessage = document.getElementById('successMessage');
                successMessage.textContent = 'Login successful!';
                successMessage.style.display = 'block';

                // Redirect after a short delay
                setTimeout(() => {
                    successMessage.style.display = 'none';
                    window.location.href = 'dashboard.html';
                }, 450);

                // Reset button
                btn.classList.remove('loading');
                btn.disabled = false;
                btnText.textContent = 'Sign In';
            }, 1500);
        }

        function showForgotPassword(e) {
            e.preventDefault();
            window.location.href = '404.html';
        }

        function closeForgotPassword() {
            const modal = document.getElementById('forgotPasswordModal');
            modal.style.display = 'none';
        }

        function submitForgotPassword(e) {
            e.preventDefault();
            const resetEmailPhone = document.getElementById('resetEmailPhone').value.trim();

            if (validateEmailOrPhone(resetEmailPhone)) {
                alert('Password reset link has been sent to ' + resetEmailPhone);
                closeForgotPassword();
                document.getElementById('forgotPasswordForm').reset();
            } else {
                alert('Please enter a valid email or mobile number');
            }
        }

        function socialLogin(provider) {
            window.location.href = '404.html';
        }

        // Close modal when clicking outside
        document.getElementById('forgotPasswordModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeForgotPassword();
            }
        });
    </script>
  <script>
    document.addEventListener('click', function (event) {
      const link = event.target.closest('a, button');
      if (!link) return;
      const text = (link.textContent || '').replace(/\s+/g, ' ').trim().toLowerCase();
      const aria = (link.getAttribute('aria-label') || '').replace(/\s+/g, ' ').trim().toLowerCase();
      const title = (link.getAttribute('title') || '').replace(/\s+/g, ' ').trim().toLowerCase();
      const target = ['explore services', 'apply online', 'learn more', 'view details', 'download pdf', 'check status', 'read more', 'facebook', 'x', 'twitter', 'instagram', 'youtube', 'linkedin'];
      if (target.includes(text) || target.includes(aria) || target.includes(title)) {
        event.preventDefault();
        window.location.href = '404.html';
      }
    }, true);
  </script>
  <script src="script.js"></script>
</body>
</html>
